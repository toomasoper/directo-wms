<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Directo Scan v5</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f4f7f9; }
        #reader { width: 100%; min-height: 280px; background: #000; border-radius: 12px; overflow: hidden; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .secondary { background: #6c757d; margin-bottom: 10px; }
        #status { text-align: center; color: #555; margin: 10px 0; font-weight: bold; }
        .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .stock-val { font-weight: bold; color: #1877f2; }
    </style>
</head>
<body>

    <button onclick="toggleSettings()" class="secondary">⚙️ Seaded</button>

    <div id="settings" class="card" style="display:none;">
        <label>Directo API URL:</label>
        <input type="text" id="apiUrl" placeholder="https://login.directo.ee/...">
        <label>API Token:</label>
        <input type="password" id="apiToken">
        <button onclick="saveSettings()" style="background:#28a745">Salvesta</button>
    </div>

    <div id="scanner-container">
        <div id="reader"></div>
        <div id="status">Vajuta nuppu kaamera jaoks</div>
        <button id="startBtn" onclick="initScanner()">📷 KÄIVITA SKANNER</button>
    </div>

    <div id="result" class="card" style="display:none;">
        <h3 id="resName" style="margin:0 0 10px 0; color:#007bff;"></h3>
        <div id="productDetails"></div>
        <button onclick="location.reload()" style="background:#28a745">UUS SKANEERIMINE</button>
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script>
        let html5QrCode;

        document.getElementById('apiUrl').value = localStorage.getItem('directo_url') || '';
        document.getElementById('apiToken').value = localStorage.getItem('directo_token') || '';

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }

        function saveSettings() {
            localStorage.setItem('directo_url', document.getElementById('apiUrl').value);
            localStorage.setItem('directo_token', document.getElementById('apiToken').value);
            alert("Salvestatud!");
            location.reload();
        }

        async function fetchDirecto(barcode) {
            const url = localStorage.getItem('directo_url');
            const token = localStorage.getItem('directo_token');
            
            const formData = new URLSearchParams();
                formData.append('token', token);
                formData.append('get', '1');
                formData.append('what', 'item');
                formData.append('barcode', barcode);
            
                try {
                    // 2. Teeme päringu Fetchiga
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: formData
                    });
            
                    // 3. Kuna Directo vastab XML-iga, loeme vastust tekstina
                    const xmlText = await response.text();
                    
                    // Siin saad nüüd XML-i edasi parsida (DOMParseriga)
                    console.log(xmlText);
                    return xmlText;
                    
                } catch (error) {
                    console.error('Päring ebaõnnestus:', error);
                }
            
        }

        function initScanner() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').innerText = "Aktiveerin...";
            
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 200 } },
                (barcode) => {
                    document.getElementById('beep').play(); // Piiks!
                    html5QrCode.stop().then(() => showResult(barcode));
                }
            ).then(() => {
                document.getElementById('status').innerText = "Skanneeri vöötkood";
            }).catch(err => {
                document.getElementById('status').innerText = "Kaamera viga: " + err;
                document.getElementById('startBtn').style.display = 'block';
            });
        }

        async function showResult(barcode) {
            document.getElementById('scanner-container').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            const details = document.getElementById('productDetails');
            details.innerHTML = "<i>Otsin Directost...</i>";

            try {
                const xmlText = await fetchDirecto(barcode);
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                
                // Directo XML parsimine vastavalt su kirjeldusele
                // Proovime leida artiklit mitmel viisil (atribuut vs element)
                const art = xmlDoc.getElementsByTagName("artikkel")[0] || xmlDoc.getElementsByTagName("item")[0];

                if (art) {
                    const name = art.getAttribute('name') || art.getAttribute('nimetus') || "Toode leitud";
                    const code = art.getAttribute('code') || barcode;
                    const stock = art.getAttribute('stock') || "0";
                    const loc = art.getAttribute('location') || "-";

                    document.getElementById('resName').innerText = name;
                    details.innerHTML = `
                        <div class="result-row"><span>Kood:</span><span>${code}</span></div>
                        <div class="result-row"><span>Laos:</span><span class="stock-val">${stock} tk</span></div>
                        <div class="result-row"><span>Asukoht:</span><span>${loc}</span></div>
                    `;
                } else {
                    details.innerHTML = "Toodet ei leitud.<br><small>Vastus: " + xmlText.substring(0, 100) + "...</small>";
                }
            } catch (e) {
                details.innerHTML = "Viga: " + e.message;
            }
        }
    </script>
</body>
</html>
