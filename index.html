<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directo Scanner</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f4f4f9; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 15px; }
        .settings-panel { display: none; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        .result-item { border-bottom: 1px solid #eee; padding: 8px 0; }
        .result-label { font-weight: bold; font-size: 0.8em; color: #666; }
    </style>
</head>
<body>

    <h2>Directo Vöötkood</h2>
    
    <button onclick="toggleSettings()" id="settingsBtn">⚙️ Seaded</button>

    <div id="settings" class="settings-panel card">
        <h3>Seadistused</h3>
        <label>API URL:</label>
        <input type="text" id="apiUrl" placeholder="https://login.directo.ee/xmlcore/...">
        <label>API Token:</label>
        <input type="password" id="apiToken" placeholder="Sinu API võti">
        <button onclick="saveSettings()">Salvesta ja Sule</button>
    </div>

    <div id="reader"></div>

    <div id="result" class="card" style="display:none;">
        <h3>Toote info</h3>
        <div id="productData"></div>
        <button onclick="resetScanner()" style="background:#28a745">Skaneeri uuesti</button>
    </div>

    <script>
        let html5QrCode;

        // Lae seaded alguses
        document.getElementById('apiUrl').value = localStorage.getItem('directo_url') || '';
        document.getElementById('apiToken').value = localStorage.getItem('directo_token') || '';

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            localStorage.setItem('directo_url', document.getElementById('apiUrl').value);
            localStorage.setItem('directo_token', document.getElementById('apiToken').value);
            toggleSettings();
            alert("Seaded salvestatud!");
        }

        function onScanSuccess(decodedText) {
            html5QrCode.stop();
            document.getElementById('reader').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            fetchDirectoData(decodedText);
        }

        async function fetchDirectoData(barcode) {
            const url = localStorage.getItem('directo_url');
            const token = localStorage.getItem('directo_token');
            const display = document.getElementById('productData');
            
            display.innerHTML = "Pärin andmeid (" + barcode + ")...";

            if (!url || !token) {
                display.innerHTML = "<span style='color:red'>Viga: Seadista URL ja Token!</span>";
                return;
            }

            // XML päringu koostamine vastavalt Directo spetsifikatsioonile
            const xmlBody = `<?xml version="1.0" encoding="UTF-8"?>
                <directo_api>
                    <token>${token}</token>
                    <request>ws_artiklid</request>
                    <parameter name="code">${barcode}</parameter>
                </directo_api>`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: xmlBody,
                    headers: { 'Content-Type': 'application/xml' }
                });
                
                const text = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "text/xml");
                
                // Siin parsitakse vastus vastavalt ws_artiklid.xsd struktuurile
                // Näidis: võtame artikli nime ja koodi
                const artikkel = xmlDoc.getElementsByTagName("artikkel")[0];
                
                if (artikkel) {
                    display.innerHTML = `
                        <div class="result-item"><div class="result-label">Kood</div>${artikkel.getAttribute('code') || '-'}</div>
                        <div class="result-item"><div class="result-label">Nimetus</div>${artikkel.getAttribute('name') || '-'}</div>
                        <div class="result-item"><div class="result-label">Hind</div>${artikkel.getAttribute('price') || '-'}</div>
                    `;
                } else {
                    display.innerHTML = "Toodet ei leitud.";
                }
            } catch (err) {
                display.innerHTML = "API viga: " + err.message;
            }
        }

        function resetScanner() {
            document.getElementById('result').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            startScanner();
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 150 } },
                onScanSuccess
            );
        }

        // Käivita skanner kohe
        startScanner();

        // Registreeri Service Worker PWA jaoks
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
