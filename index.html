<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Directo WMS Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f4f7f9; color: #333; }
        #reader { width: 100%; min-height: 280px; background: #000; border-radius: 12px; overflow: hidden; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        .secondary { background: #6c757d; margin-bottom: 10px; padding: 8px; font-size: 0.8em; }
        #status { text-align: center; margin: 10px 0; font-size: 0.9em; min-height: 1.2em; color: #666; }
        .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .error-card { background: #fff5f5; border: 1px solid #feb2b2; padding: 15px; border-radius: 8px; margin-top: 10px; color: #c53030; font-size: 0.85em; }
        .success-badge { background: #e6fffa; color: #2c7a7b; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <button onclick="toggleSettings()" class="secondary">⚙️ Seaded</button>

    <div id="settings" class="card" style="display:none;">
        <label>Directo API URL (peab algama https://):</label>
        <input type="text" id="apiUrl" placeholder="https://login.directo.ee/xmlcore/wmsd/xmlcore.asp">
        <label>API Token:</label>
        <input type="password" id="apiToken">
        <button onclick="saveSettings()" style="background:#28a745">Salvesta seaded</button>
        <p style="font-size: 0.7em; color: #666; margin-top: 10px;">NB! Kui ikka ei tööta, kontrolli, et URL on täpselt õige.</p>
    </div>

    <div id="scanner-container">
        <div id="reader"></div>
        <div id="status">Ootan...</div>
        <button id="startBtn" onclick="initScanner()" style="display:none; background:#28a745; margin-top:10px;">📷 KÄIVITA KAAMERA</button>
    </div>

    <div id="result" style="display:none;">
        <div class="card">
            <h3 id="resName" style="margin:0 0 10px 0; color:#007bff;"></h3>
            <div id="productDetails"></div>
            <button onclick="resetScanner()" style="background:#28a745; margin-top:15px;">UUS SKANEERIMINE</button>
        </div>
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

    <script>
        let html5QrCode;

        document.getElementById('apiUrl').value = localStorage.getItem('directo_url') || '';
        document.getElementById('apiToken').value = localStorage.getItem('directo_token') || '';

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }

        function saveSettings() {
            localStorage.setItem('directo_url', document.getElementById('apiUrl').value.trim());
            localStorage.setItem('directo_token', document.getElementById('apiToken').value.trim());
            location.reload();
        }

        async function fetchDirecto(barcode) {
            const baseUrl = localStorage.getItem('directo_url');
            const token = localStorage.getItem('directo_token');
            
            // UUS PROXY: corsproxy.io on sageli kiirem ja stabiilsem
            const proxyPrefix = "https://corsproxy.io/?";
            const directoUrl = `${baseUrl}?token=${encodeURIComponent(token)}&get=1&what=item&barcode=${encodeURIComponent(barcode)}`;
            
            const finalUrl = proxyPrefix + encodeURIComponent(directoUrl);

            try {
                const response = await fetch(finalUrl, {
                    method: 'GET', // Kasutame GET-i, et proxy-st kergemini läbi pääseda
                    headers: { 'Accept': 'application/xml' }
                });

                if (!response.ok) throw new Error(`Serveri viga (${response.status})`);
                
                const xmlText = await response.text();
                if (!xmlText) throw new Error("Server saatis tühja vastuse.");
                return xmlText;
            } catch (err) {
                console.error(err);
                throw new Error("VÕRGU VIGA: Brauser ei saanud Directoga ühendust. Kontrolli internetti või proovi hiljem uuesti.");
            }
        }

        function initScanner() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').innerText = "Käivitan kaamerat...";
            
            html5QrCode = new Html5Qrcode("reader");
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 15, qrbox: { width: 250, height: 200 } },
                (barcode) => {
                    document.getElementById('beep').play().catch(() => {});
                    html5QrCode.stop().then(() => showResult(barcode));
                }
            ).then(() => {
                document.getElementById('status').innerText = "Skanneeri vöötkood";
            }).catch(err => {
                document.getElementById('status').innerText = "Kaamera viga.";
                document.getElementById('startBtn').style.display = 'block';
            });
        }

        async function showResult(barcode) {
            document.getElementById('scanner-container').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            const details = document.getElementById('productDetails');
            details.innerHTML = "<i>Päring Directosse...</i>";

            try {
                const xmlText = await fetchDirecto(barcode);
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                
                // Kontrollime, kas XML on vigane
                if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                    throw new Error("Vigane XML vastus serverist.");
                }

                const art = xmlDoc.getElementsByTagName("artikkel")[0] || 
                            xmlDoc.getElementsByTagName("item")[0] ||
                            xmlDoc.querySelector("row");

                if (art) {
                    const name = art.getAttribute('name') || art.getAttribute('nimetus') || "Toode leitud";
                    const stock = art.getAttribute('stock') || art.getAttribute('laoseis') || "0";
                    const loc = art.getAttribute('location') || art.getAttribute('asukoht') || "-";
                    const code = art.getAttribute('code') || art.getAttribute('kood') || barcode;

                    document.getElementById('resName').innerText = name;
                    details.innerHTML = `
                        <div class="result-row"><span>Kood:</span><span>${code}</span></div>
                        <div class="result-row"><span>Laos:</span><span class="success-badge">${stock} tk</span></div>
                        <div class="result-row"><span>Asukoht:</span><span>${loc}</span></div>
                    `;
                } else {
                    details.innerHTML = `
                        <div class="error-card">
                            <b>Toodet ei leitud.</b><br>
                            Kood: ${barcode}<br><br>
                            <details><summary>Vaata serveri vastust</summary><pre>${xmlText.substring(0,200)}</pre></details>
                        </div>`;
                }
            } catch (e) {
                details.innerHTML = `<div class="error-card"><b>VIGA:</b> ${e.message}</div>`;
            }
        }

        function resetScanner() {
            location.reload();
        }

        window.onload = initScanner;
    </script>
</body>
</html>
