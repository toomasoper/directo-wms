<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Directo WMS v6</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f4f7f9; }
        #reader { width: 100%; min-height: 280px; background: #000; border-radius: 12px; overflow: hidden; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .secondary { background: #6c757d; margin-bottom: 10px; padding: 10px; font-size: 0.8em; }
        #status { text-align: center; color: #555; margin: 10px 0; font-size: 0.9em; min-height: 1.2em; }
        .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .error-msg { color: #721c24; background: #f8d7da; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.8em; word-break: break-all; }
    </style>
</head>
<body>

    <button onclick="toggleSettings()" class="secondary">⚙️ Seaded</button>

    <div id="settings" class="card" style="display:none;">
        <label>Directo API URL:</label>
        <input type="text" id="apiUrl" placeholder="https://login.directo.ee/...">
        <label>API Token:</label>
        <input type="password" id="apiToken">
        <button onclick="saveSettings()" style="background:#28a745">Salvesta</button>
    </div>

    <div id="scanner-container">
        <div id="reader"></div>
        <div id="status">Ootan...</div>
        <button id="startBtn" onclick="initScanner()" style="display:none; background:#28a745; margin-top:10px;">📷 KÄIVITA KAAMERA</button>
    </div>

    <div id="result" class="card" style="display:none;">
        <h3 id="resName" style="margin:0 0 10px 0; color:#007bff;"></h3>
        <div id="productDetails"></div>
        <button onclick="resetScanner()" style="background:#28a745; margin-top:15px;">UUS SKANEERIMINE</button>
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

    <script>
        let html5QrCode;

        // Lae seaded
        document.getElementById('apiUrl').value = localStorage.getItem('directo_url') || '';
        document.getElementById('apiToken').value = localStorage.getItem('directo_token') || '';

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }

        function saveSettings() {
            localStorage.setItem('directo_url', document.getElementById('apiUrl').value);
            localStorage.setItem('directo_token', document.getElementById('apiToken').value);
            location.reload();
        }

        async function fetchDirecto(barcode) {
            const baseUrl = localStorage.getItem('directo_url');
            const token = localStorage.getItem('directo_token');
            
            // PROXY VALIK: Kui allorigins ei tööta, saab siin vahetada.
            // Kasutame "AllOrigins" läbi koodi, et vältida vahemälu probleeme
            const proxy = `https://api.allorigins.win/raw?timestamp=${Date.now()}&url=`;
            
            const directoUrl = `${baseUrl}?token=${encodeURIComponent(token)}&get=1&what=item&barcode=${encodeURIComponent(barcode)}`;
            
            try {
                const response = await fetch(proxy + encodeURIComponent(directoUrl));
                if (!response.ok) throw new Error(`Serveri viga: ${response.status}`);
                const xmlText = await response.text();
                return xmlText;
            } catch (err) {
                throw new Error("Võrgu viga: Kontrolli internetti või API URL-i. " + err.message);
            }
        }

        function initScanner() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').innerText = "Käivitan kaamerat...";
            
            if (html5QrCode) {
                html5QrCode.clear();
            }
            
            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 10, 
                qrbox: { width: 250, height: 200 },
                aspectRatio: 1.0
            };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (barcode) => {
                    const audio = document.getElementById('beep');
                    audio.play().catch(() => {}); // Mõni brauser blokib heli ilma klikita
                    html5QrCode.stop().then(() => showResult(barcode));
                }
            ).then(() => {
                document.getElementById('status').innerText = "Skanneeri vöötkood";
            }).catch(err => {
                document.getElementById('status').innerText = "Kaamera ei käivitunud.";
                document.getElementById('startBtn').style.display = 'block';
            });
        }

        async function showResult(barcode) {
            document.getElementById('scanner-container').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            const details = document.getElementById('productDetails');
            details.innerHTML = "<i>Pärin andmeid Directost...</i>";

            try {
                const xmlText = await fetchDirecto(barcode);
                
                // Kui vastus on tühi või liiga lühike
                if (!xmlText || xmlText.length < 10) {
                    throw new Error("Directo saatis tühja vastuse.");
                }

                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                
                // Kontrollime XML vigu
                const parseError = xmlDoc.getElementsByTagName("parsererror")[0];
                if (parseError) throw new Error("XML parsimise viga.");

                const art = xmlDoc.getElementsByTagName("artikkel")[0] || 
                            xmlDoc.getElementsByTagName("item")[0] ||
                            xmlDoc.getElementsByTagName("row")[0];

                if (art) {
                    const name = art.getAttribute('name') || art.getAttribute('nimetus') || "Nimetus puudub";
                    const code = art.getAttribute('code') || art.getAttribute('kood') || barcode;
                    const stock = art.getAttribute('stock') || art.getAttribute('laoseis') || "0";
                    const loc = art.getAttribute('location') || art.getAttribute('asukoht') || "-";

                    document.getElementById('resName').innerText = name;
                    details.innerHTML = `
                        <div class="result-row"><span>Kood:</span><span>${code}</span></div>
                        <div class="result-row"><span>Laos:</span><span style="font-weight:bold; color:#007bff;">${stock} tk</span></div>
                        <div class="result-row"><span>Asukoht:</span><span>${loc}</span></div>
                    `;
                } else {
                    details.innerHTML = `<div class="error-msg">Toodet [${barcode}] ei leitud.<br><br>Vastus Directost:<br>${xmlText.replace(/</g, '&lt;')}</div>`;
                }
            } catch (e) {
                details.innerHTML = `<div class="error-msg"><b>Viga:</b> ${e.message}</div>
                <button onclick="resetScanner()" style="background:#6c757d; margin-top:10px;">Proovi uuesti</button>`;
            }
        }

        function resetScanner() {
            location.reload();
        }

        window.onload = initScanner;
    </script>
</body>
</html>
