<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directo Scanner Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: #f0f2f5; color: #1c1e21; }
        h2 { text-align: center; color: #007bff; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: black; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-top: 20px; }
        .settings-panel { display: none; margin-bottom: 20px; border: 2px solid #007bff; }
        .input-group { position: relative; }
        input { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .toggle-password { position: absolute; right: 10px; top: 12px; background: none; border: none; font-size: 20px; cursor: pointer; color: #666; }
        button { background: #007bff; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        .secondary-btn { background: #6c757d; margin-bottom: 15px; }
        .test-btn { background: #ffc107; color: #212529; margin-bottom: 10px; }
        .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; }
        .stock-tag { background: #e7f3ff; color: #1877f2; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Directo WMS</h2>
    
    <button onclick="toggleSettings()" class="secondary-btn">⚙️ Seadista API</button>

    <div id="settings" class="settings-panel card">
        <h3>Seaded</h3>
        <label>API URL:</label>
        <input type="text" id="apiUrl" placeholder="https://login.directo.ee/xmlcore/...">
        
        <label>API Token:</label>
        <div class="input-group">
            <input type="password" id="apiToken" placeholder="Sinu token">
            <button type="button" class="toggle-password" onclick="toggleToken()">👁️</button>
        </div>
        
        <button onclick="testConnection()" class="test-btn" id="testBtn">🔍 Kontrolli ühendust</button>
        <div id="testResult" style="font-size: 0.8em; margin-top: 5px;"></div>
        
        <button onclick="saveSettings()" style="background:#28a745; margin-top: 20px;">Salvesta ja Sule</button>
    </div>

    <div id="reader"></div>
    <div id="status" style="text-align:center; margin-top:10px; color:#666;">Skanneeri vöötkood...</div>

    <div id="result" class="card" style="display:none;">
        <h3 id="resName" style="margin:0"></h3>
        <small id="resCode" style="color:#888"></small>
        <div id="productDetails" style="margin-top:15px;"></div>
        <button onclick="resetScanner()" style="background:#28a745; margin-top: 20px;">Järgmine toode</button>
    </div>

    <script>
        let html5QrCode;

        // Seadete laadimine
        document.getElementById('apiUrl').value = localStorage.getItem('directo_url') || '';
        document.getElementById('apiToken').value = localStorage.getItem('directo_token') || '';

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        }

        function toggleToken() {
            const t = document.getElementById('apiToken');
            t.type = t.type === "password" ? "text" : "password";
        }

        function saveSettings() {
            localStorage.setItem('directo_url', document.getElementById('apiUrl').value);
            localStorage.setItem('directo_token', document.getElementById('apiToken').value);
            toggleSettings();
            location.reload();
        }

        // --- PÄRINGU LOOGIKA (Simuleerib sinu CURLi) ---
        async function callDirecto(barcode) {
            const url = localStorage.getItem('directo_url');
            const token = localStorage.getItem('directo_token');

            const params = new URLSearchParams();
            params.append('token', token);
            params.append('get', '1');
            params.append('what', 'item');
            params.append('barcode', barcode);

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });
            return await response.text();
        }

        async function testConnection() {
            const btn = document.getElementById('testBtn');
            const res = document.getElementById('testResult');
            btn.disabled = true;
            res.innerText = "Kontrollin...";

            try {
                const text = await callDirecto('TEST');
                if (text.includes('<?xml')) {
                    res.style.color = "green";
                    res.innerText = "✅ Ühendus korras! Server vastas XML-iga.";
                } else {
                    res.style.color = "red";
                    res.innerText = "❌ Vigane vastus. Kontrolli URL-i ja Tokenit.";
                }
            } catch (e) {
                res.style.color = "red";
                res.innerText = "❌ Viga: " + e.message;
            } finally {
                btn.disabled = false;
            }
        }

        async function handleScan(barcode) {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            const details = document.getElementById('productDetails');
            details.innerHTML = "Otsin...";

            try {
                const xmlText = await callDirecto(barcode);
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const item = xmlDoc.getElementsByTagName("artikkel")[0] || xmlDoc.getElementsByTagName("item")[0];

                if (item) {
                    document.getElementById('resName').innerText = item.getAttribute('name') || "Nimetus puudub";
                    document.getElementById('resCode').innerText = "Kood: " + (item.getAttribute('code') || barcode);
                    details.innerHTML = `
                        <div class="result-row"><span>Laos</span><span class="stock-tag">${item.getAttribute('stock') || 0} tk</span></div>
                        <div class="result-row"><span>Asukoht</span><span>${item.getAttribute('location') || '-'}</span></div>
                        <div class="result-row"><span>Hind</span><span>${item.getAttribute('price') || '-'} €</span></div>
                    `;
                } else {
                    details.innerHTML = "Toodet ei leitud.";
                }
            } catch (e) {
                details.innerHTML = "Viga: " + e.message;
            }
        }

        function onScanSuccess(decodedText) {
            html5QrCode.stop();
            handleScan(decodedText);
        }

        function resetScanner() {
            document.getElementById('result').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            document.getElementById('status').style.display = 'block';
            startScanner();
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScanSuccess)
                .catch(err => document.getElementById('status').innerText = "Kaamera viga: " + err);
        }

        window.onload = startScanner;
    </script>
</body>
</html>
